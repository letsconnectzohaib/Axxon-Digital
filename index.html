<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Axxon Digital | Growth-Driven Digital Marketing Agency</title>
    <meta name="description" content="A full-service digital marketing agency that empowers brands to stand out in the online world. We specialize in SMM, Branding, SEO, and Web Development." />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/lucide-icons/lucide/main/icons/zap.svg" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://axxondigital.com/" />
    <meta property="og:title" content="Axxon Digital | Growth-Driven Digital Marketing Agency" />
    <meta property="og:description" content="A full-service digital marketing agency that empowers brands to stand out in the online world. We specialize in SMM, Branding, SEO, and Web Development." />
    <meta property="og:image" content="https://picsum.photos/seed/axxon-digital/1200/630" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://axxondigital.com/" />
    <meta property="twitter:title" content="Axxon Digital | Growth-Driven Digital Marketing Agency" />
    <meta property="twitter:description" content="A full-service digital marketing agency that empowers brands to stand out in the online world. We specialize in SMM, Branding, SEO, and Web Development." />
    <meta property="twitter:image" content="https://picsum.photos/seed/axxon-digital/1200/630" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#0A0A0A" />
    <script>
      (function() {
        const savedTheme = localStorage.getItem('theme');
        let theme = 'blue';
        if (savedTheme) {
          theme = savedTheme;
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          theme = 'dark';
        }
        document.documentElement.classList.add(theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
