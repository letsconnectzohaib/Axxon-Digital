    <!-- Theme Color -->
    <meta name="theme-color" content="#0A0A0A" />
    <script>
      (function() {
        const savedTheme = localStorage.getItem('theme');
        let theme = 'blue';
        if (savedTheme) {
          theme = savedTheme;
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          theme = 'dark';
        }
        document.documentElement.classList.add(theme);
      })();
    </script>
